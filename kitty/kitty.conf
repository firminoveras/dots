# Font Configuration
shell fish
font_size 9.0
font_family family='MonoLisa Nerd Font' style='Black Regular' postscript_name=MonoLisaNF-BlackRegular features="+ss02 +ss11 +liga +calt +ss04 +zero +ss07 +ss12 +ss13 +ss14 +ss15 +ss16 +ss17"
bold_font family='MonoLisa Nerd Font' style='Black Regular' postscript_name=MonoLisaNF-BlackRegular features="+ss02 +ss11 +liga +calt +ss04 +zero +ss07 +ss12 +ss13 +ss14 +ss15 +ss16 +ss17"
italic_font family='MonoLisa Nerd Font' style='Black Italic' postscript_name=MonoLisaNF-BlackItalic features="+ss02 +ss11 +liga +calt +ss04 +zero +ss07 +ss12 +ss13 +ss14 +ss15 +ss16 +ss17"
bold_italic_font family='MonoLisa Nerd Font' style='Black Italic' postscript_name=MonoLisaNF-BlackItalic features="+ss02 +ss11 +liga +calt +ss04 +zero +ss07 +ss12 +ss13 +ss14 +ss15 +ss16 +ss17"
disable_ligatures never

# Window Configuration
background_opacity 1.0
background_blur 32
confirm_os_window_close 0

# Cursor Configuration
cursor_trail 1
cursor_trail_decay 0.1 0.4
cursor_shape block
cursor_blink_interval 1

# Scrollback
scrollback_lines 3000

# Terminal features
copy_on_select yes
strip_trailing_spaces smart

# Key bindings for common actions
map ctrl+shift+n new_window
map ctrl+t new_tab
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# Tab configuration
tab_bar_style powerline
tab_bar_align left

# Shell integration
shell_integration enabled

include theme.conf
