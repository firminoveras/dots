shell fish
shell_integration enabled

font_size        9.0
font_family      family="MonoLisa Nerd Font" style="Black Regular"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_features MonoLisaNF-BlackRegular +ss02 +ss11 +liga +calt +ss04 +zero +ss07 +ss12 +ss13 +ss14 +ss15 +ss16 +ss17
font_features MonoLisaNF-BlackItalic  +ss02 +ss11 +liga +calt +ss04 +zero +ss07 +ss12 +ss13 +ss14 +ss15 +ss16 +ss17
disable_ligatures never

background_opacity 0.9
background_blur    0
confirm_os_window_close 0
repaint_delay    10
input_delay      3
sync_to_monitor  yes

placement_strategy bottom

cursor_shape          block
cursor_blink_interval 1
cursor_trail          1
cursor_trail_decay    0.1 0.4

scrollback_lines      5000
copy_on_select        yes
strip_trailing_spaces smart

tab_bar_style      powerline
tab_bar_align      left
tab_powerline_style slanted

map ctrl+shift+n new_window
map ctrl+o       new_tab

map ctrl+equal change_font_size all +1.0
map ctrl+plus  change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0     change_font_size all 0

map ctrl+shift+up   scroll_line_up
map ctrl+shift+down scroll_line_down

url_style curly
open_url_with default
detect_urls yes

mouse_map left click ungrabbed mouse_handle_click selection link

include theme.conf
