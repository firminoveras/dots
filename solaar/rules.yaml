%YAML 1.3
---
- Key: [Middle Button, pressed]
- Execute: [hyprctl, eval, '''hl.dispatch(hl.dsp.focus({ workspace = "1" }))''']
...
---
- Key: [Forward Button, pressed]
- Execute: [hyprctl, eval, 'hl.dispatch(hl.dsp.focus({ workspace = "r-1" }))']
- Execute: [niri, msg, action, focus-column-left]
...
---
- Key: [Back Button, pressed]
- Execute: [hyprctl, eval, 'hl.dispatch(hl.dsp.focus({ workspace = "r+1" }))']
- Execute: [niri, msg, action, focus-column-right]
...
